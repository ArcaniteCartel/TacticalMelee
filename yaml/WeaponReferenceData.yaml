# WeaponReferenceData.yaml
#
# Physical weapon reference data — one entry per weapon type.
#
# WHAT THIS IS:
#   Stable, technique-independent properties of each weapon: its physical
#   size class, inertial character, maneuverability, effective reach, and
#   damage type signature. These values are constant for the weapon itself
#   regardless of which combat package or technique is in use.
#
# WHAT THIS IS NOT:
#   This file is NOT package data. It does not describe timing, line,
#   targeting, wager, bind, or any other resolution parameter that belongs
#   to a specific WPP profile. Those live in GenericWeaponPatternParameterCatalog_rich.yaml
#   and WeaponSpecificTieredPackageCatalog_rich.yaml and are selected at
#   Bout formation when a package is chosen. This file is consulted BEFORE
#   any package is selected — it drives weapon-level decisions such as
#   reach comparison, encumbrance, and damage-type filtering.
#
# SOURCE:
#   Derived from weapon_size_profile, range_profile, and damage_type_profile
#   fields that are consistent across every WPP profile belonging to each
#   weapon type. Fields that varied across profiles would be flagged
#   INCONSISTENT and set to null (none were found in this generation).

weapons:

  # --- Dagger ---
  - weapon: dagger
    size: very_small
    inertia: low
    maneuverability: high
    reach: very_short
    damage_primary: piercing
    damage_secondary: cutting

